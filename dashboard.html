<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>VIP Dashboard</h1>

<p id="user"></p>
<p>Saldo: Rp <span id="saldo">0</span></p>

<button onclick="tambahSaldo()">Tambah Saldo</button>
<button onclick="logout()">Logout</button>

<h2>Layanan</h2>

<div class="services">
  <div class="card">
    <h3>Instagram Boost</h3>
    <button onclick="order('Instagram')">Order</button>
  </div>

  <div class="card">
    <h3>TikTok Growth</h3>
    <button onclick="order('TikTok')">Order</button>
  </div>

  <div class="card">
    <h3>YouTube Promo</h3>
    <button onclick="order('YouTube')">Order</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhSu9CnvQ-wLG-oHh8ad4DfIVZ3mb54ic",
  authDomain: "nyyyxyz.firebaseapp.com",
  projectId: "nyyyxyz",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("user").innerText = "Login sebagai: " + user.email;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      await setDoc(userRef, { saldo: 0 });
      document.getElementById("saldo").innerText = 0;
    } else {
      document.getElementById("saldo").innerText = snap.data().saldo;
    }

  } else {
    window.location.href = "login.html";
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
}

window.tambahSaldo = async function() {
  const userRef = doc(db, "users", currentUser.uid);
  const snap = await getDoc(userRef);

  let saldo = snap.data().saldo + 10000;

  await updateDoc(userRef, { saldo: saldo });

  document.getElementById("saldo").innerText = saldo;
}

window.order = function(layanan) {
  alert("Order: " + layanan + " (fitur belum aktif)");
}
</script>

</body>
</html>
